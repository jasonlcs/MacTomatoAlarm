name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .app and DMG
        run: |
          chmod +x build-app.sh
          ./build-app.sh

      - name: Read version from Info.plist
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Sources/MacTomatoAlarm/Info.plist)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          files: .build/app/MacTomatoAlarm.dmg
          generate_release_notes: true
